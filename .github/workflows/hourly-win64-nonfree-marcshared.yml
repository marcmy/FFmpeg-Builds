name: Marcshared FFmpeg Release

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - marcshared-image-updated
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write
  packages: read

env:
  UPSTREAM_REPO: https://github.com/FFmpeg/FFmpeg.git
  TARGET: win64
  VARIANT: nonfree-marcshared
  FFMPEG_REPO_OVERRIDE: https://github.com/FFmpeg/FFmpeg.git
  GIT_BRANCH_OVERRIDE: master
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FFBUILD_CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  FFBUILD_CCACHE_MAX_SIZE: 5G

concurrency:
  group: marcshared-ffmpeg-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          df -h
          sudo apt-get clean
          docker system prune -a -f
          sudo rm -rf /opt/ghc /usr/local/.ghcup /usr/local/lib/android
          df -h

      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore FFmpeg ccache
        id: ffmpeg-ccache
        uses: actions/cache/restore@v4
        with:
          path: .cache/ccache
          key: ffmpeg-ccache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-${{ github.run_id }}
          restore-keys: |
            ffmpeg-ccache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build, release, and update scoop manifest
        env:
          GH_TOKEN: ${{ github.token }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          set -euo pipefail

          ffmpeg_sha="$(git ls-remote "$UPSTREAM_REPO" refs/heads/master | awk '{print $1}')"
          ffmpeg_short="${ffmpeg_sha:0:12}"
          package_version="$(date -u +'%Y%m%d.%H%M%S')"
          release_tag="ffmpeg-${package_version}-win64-nonfree-marcshared"
          zip_name="ffmpeg-${package_version}-win64-nonfree-marcshared.zip"

          echo "Upstream FFmpeg master SHA: ${ffmpeg_sha}"
          echo "Package version: ${package_version}"
          echo "Release tag: ${release_tag}"

          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            latest_body="$(gh release view --repo "$GITHUB_REPOSITORY" --json body -q .body 2>/dev/null || true)"
            if grep -q "$ffmpeg_sha" <<< "$latest_body"; then
              echo "Latest release already contains upstream SHA ${ffmpeg_sha}; skipping scheduled build."
              exit 0
            fi
          fi

          ./build.sh "$TARGET" "$VARIANT"

          mkdir release
          cp artifacts/*.zip "release/${zip_name}"
          sha256sum "release/${zip_name}" > release/checksums.sha256

          printf 'Upstream FFmpeg master SHA: %s\nUpstream FFmpeg short SHA: %s\nBuilder repository SHA: %s\n' \
            "$ffmpeg_sha" "$ffmpeg_short" "$GITHUB_SHA" > release/release-notes.md

          gh release create "$release_tag" \
            "release/${zip_name}" \
            "release/checksums.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --title "FFmpeg win64 Nonfree Marcshared ${package_version}" \
            --notes-file release/release-notes.md \
            --latest

          if [[ -z "${SCOOP_BUCKET_TOKEN:-}" ]]; then
            echo "SCOOP_BUCKET_TOKEN is not set; skipping scoop manifest update."
            exit 0
          fi

          zip_hash="$(sha256sum "release/${zip_name}" | awk '{print $1}')"
          zip_url="https://github.com/marcmy/FFmpeg-Builds/releases/download/${release_tag}/${zip_name}"

          export PACKAGE_VERSION="$package_version"
          export ZIP_HASH="$zip_hash"
          export ZIP_URL="$zip_url"

          git clone https://github.com/marcmy/scoop-bucket.git scoop-bucket

          cd scoop-bucket
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('bucket/ffmpeg-nonfree-marcshared.json')
          data = json.loads(path.read_text())

          version = os.environ['PACKAGE_VERSION']
          zip_url = os.environ['ZIP_URL']
          zip_hash = os.environ['ZIP_HASH']

          data['version'] = version
          data['architecture']['64bit']['url'] = zip_url
          data['architecture']['64bit']['hash'] = zip_hash
          data['checkver'] = {
              'script': [
                  "$ErrorActionPreference='Stop'",
                  "$headers=@{ 'User-Agent'='Scoop-Checkver'; 'Accept'='application/vnd.github+json'; 'X-GitHub-Api-Version'='2022-11-28' }",
                  "$releases=Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/marcmy/FFmpeg-Builds/releases?per_page=50'",
                  "$release=$releases | Where-Object { $_.tag_name -match '^ffmpeg-[0-9]{8}\\.[0-9]{6}-win64-nonfree-marcshared$' } | Select-Object -First 1",
                  "if ($null -eq $release) { 'ffmpeg-00000000.000000-win64-nonfree-marcshared' } else { $release.tag_name }",
              ],
              'regex': r'^ffmpeg-([0-9]{8}\.[0-9]{6})-win64-nonfree-marcshared$',
              'replace': '$1',
          }
          data['autoupdate'] = {
              'architecture': {
                  '64bit': {
                      'url': 'https://github.com/marcmy/FFmpeg-Builds/releases/download/ffmpeg-$version-win64-nonfree-marcshared/ffmpeg-$version-win64-nonfree-marcshared.zip'
                  }
              }
          }

          path.write_text(json.dumps(data, indent=4) + '\n')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/ffmpeg-nonfree-marcshared.json

          if git diff --cached --quiet; then
            echo "Scoop manifest already up to date."
          else
            git commit -m "Update ffmpeg-nonfree-marcshared to ${package_version}"
            git remote set-url origin "https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/marcmy/scoop-bucket.git"
            git push origin HEAD:master
          fi

      - name: Save FFmpeg ccache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: .cache/ccache
          key: ${{ steps.ffmpeg-ccache.outputs.cache-primary-key }}
