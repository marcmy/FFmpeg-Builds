name: Cleanup Actions Caches

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build win64 Marc Shared FFmpeg image
      - Marc Shared FFmpeg Release
    types:
      - completed
  schedule:
    - cron: "41 6 * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: actions-cache-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Prune old FFmpeg Actions caches
        env:
          GH_TOKEN: ${{ github.token }}
          MIN_AGE_HOURS: "3"
        run: |
          set -euo pipefail

          min_age_seconds=$((MIN_AGE_HOURS * 60 * 60))
          now_epoch="$(date -u +%s)"

          prune_prefix() {
            local prefix="$1"
            local keep="$2"
            local seen=0

            echo "Pruning prefix '${prefix}', keeping ${keep}; ignoring caches used in the last ${MIN_AGE_HOURS} hours."

            gh api \
              "repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&sort=last_accessed_at&direction=desc&key=${prefix}" \
              --jq '.actions_caches[] | [.id, .key, .last_accessed_at, .size_in_bytes] | @tsv' |
            while IFS=$'\t' read -r cache_id cache_key last_accessed_at size_in_bytes; do
              seen=$((seen + 1))

              if (( seen <= keep )); then
                echo "Keeping ${cache_key} (${size_in_bytes} bytes): newest ${seen}/${keep}."
                continue
              fi

              last_epoch="$(date -u -d "$last_accessed_at" +%s)"
              age_seconds=$((now_epoch - last_epoch))

              if (( age_seconds < min_age_seconds )); then
                echo "Keeping ${cache_key} (${size_in_bytes} bytes): last used less than ${MIN_AGE_HOURS} hours ago."
                continue
              fi

              echo "Deleting ${cache_key} (${size_in_bytes} bytes), cache id ${cache_id}."
              gh api \
                -X DELETE \
                "repos/${GITHUB_REPOSITORY}/actions/caches/${cache_id}" \
                --silent
            done
          }

          prune_prefix "ffmpeg-cache-Linux-win64-marc-shared-" 2
          prune_prefix "ffmpeg-download-cache-Linux-win64-marc-shared-" 1
          prune_prefix "ffmpeg-cache-Linux-win64-nonfree-marcshared-" 1
          prune_prefix "ffmpeg-download-cache-Linux-win64-nonfree-marcshared-" 1
