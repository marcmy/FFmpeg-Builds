name: Build win64 Marc Shared FFmpeg image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/buildkit.toml
      - .github/workflows/build-win64-marc-shared-image.yml
      - addins/**
      - images/**
      - patches/**
      - scripts.d/**
      - util/**
      - variants/**
      - download.sh
      - generate.sh
      - makeimage.sh

permissions:
  actions: write
  contents: write
  packages: write

env:
  TARGET: win64
  VARIANT: marc-shared
  SOURCE_REPO: ghcr.io/btbn/ffmpeg-builds
  TARGET_REPO: ghcr.io/marcmy/ffmpeg-builds
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: marc-shared-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          df -h
          sudo apt-get clean
          docker system prune -a -f
          sudo rm -rf /opt/ghc /usr/local/.ghcup /usr/local/lib/android
          df -h

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve image input revision
        id: image-revision
        run: |
          set -euo pipefail
          image_input_sha="$(
            git log -1 --format=%H -- \
              .github/buildkit.toml \
              .github/workflows/build-win64-marc-shared-image.yml \
              addins \
              images \
              patches \
              scripts.d \
              util \
              variants \
              download.sh \
              generate.sh \
              makeimage.sh
          )"

          if [[ -z "$image_input_sha" ]]; then
            echo "Unable to resolve the image input revision."
            exit 1
          fi

          echo "Image input revision: ${image_input_sha}"
          echo "sha=${image_input_sha}" >> "$GITHUB_OUTPUT"

      - name: Restore FFmpeg source download cache
        id: ffmpeg-download-cache
        uses: actions/cache/restore@v6
        with:
          path: .cache/downloads
          key: ffmpeg-download-cache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-${{ hashFiles('download.sh', 'util/dl_functions.sh', 'variants/**', 'scripts.d/**', 'addins/**') }}
          restore-keys: |
            ffmpeg-download-cache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config: .github/buildkit.toml

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Borrow BtbN base images
        run: |
          docker pull "$SOURCE_REPO/base:latest"
          docker pull "$SOURCE_REPO/base-win64:latest"

          docker tag "$SOURCE_REPO/base:latest" "$TARGET_REPO/base:latest"
          docker tag "$SOURCE_REPO/base-win64:latest" "$TARGET_REPO/base-win64:latest"

          docker push "$TARGET_REPO/base:latest"
          docker push "$TARGET_REPO/base-win64:latest"

      - name: Inspect registry build cache
        run: |
          cache_ref="$TARGET_REPO/win64-marc-shared:buildcache"
          if docker buildx imagetools inspect "$cache_ref"; then
            echo "Registry build cache found: $cache_ref"
          else
            echo "::warning::Registry build cache is missing or unreadable: $cache_ref"
          fi

      - name: Build win64 Marc Shared image
        env:
          BUILDKIT_PROGRESS: plain
        run: |
          mkdir -p logs
          set +e
          {
            echo "=== Build win64 Marc Shared image ==="
            echo "Run ID: ${GITHUB_RUN_ID}"
            echo "Run attempt: ${GITHUB_RUN_ATTEMPT}"
            echo "Repository SHA: ${GITHUB_SHA}"
            echo "Image input revision: ${{ steps.image-revision.outputs.sha }}"
            echo "UTC start: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo

            FFBUILD_LOCAL_FINAL_CACHE=0 \
            FFBUILD_DOCKER_CACHE_FROM="type=registry,ref=${TARGET_REPO}/win64-marc-shared:buildcache" \
            FFBUILD_DOCKER_CACHE_TO="type=registry,ref=${TARGET_REPO}/win64-marc-shared:buildcache,mode=max" \
            QUICKBUILD=1 NOCLEAN=1 ./makeimage.sh "$TARGET" "$VARIANT"
          } 2>&1 | tee logs/build-win64-marc-shared-image.log
          status=${PIPESTATUS[0]}

          cached_steps="$(grep -c ' CACHED$' logs/build-win64-marc-shared-image.log || true)"
          cache_imports="$(grep -c 'importing cache manifest' logs/build-win64-marc-shared-image.log || true)"
          echo "BuildKit cache imports: ${cache_imports}"
          echo "BuildKit cached steps: ${cached_steps}"

          if [[ "$cache_imports" == "0" ]]; then
            echo "::warning::BuildKit did not report importing the registry build cache."
          fi

          exit "$status"

      - name: Upload Marc Shared image build log
        if: ${{ always() }}
        uses: actions/upload-artifact@main
        with:
          name: marc-shared-image-build-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/build-win64-marc-shared-image.log
          if-no-files-found: warn
          retention-days: 30

      - name: Save FFmpeg source download cache
        if: ${{ always() && steps.ffmpeg-download-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: .cache/downloads
          key: ffmpeg-download-cache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-${{ hashFiles('download.sh', 'util/dl_functions.sh', 'variants/**', 'scripts.d/**', 'addins/**') }}

      - name: Push win64 Marc Shared image
        run: |
          source_image="$TARGET_REPO/win64-marc-shared:source-${{ steps.image-revision.outputs.sha }}"
          docker tag "$TARGET_REPO/win64-marc-shared:latest" "$source_image"
          docker push "$TARGET_REPO/win64-marc-shared:latest"
          docker push "$source_image"

      - name: Trigger Marc Shared FFmpeg release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          IMAGE_INPUT_SHA: ${{ steps.image-revision.outputs.sha }}
        run: |
          jq -n --arg image_input_sha "$IMAGE_INPUT_SHA" \
            '{event_type:"marc-shared-image-updated",client_payload:{image_input_sha:$image_input_sha}}' |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/dispatches" --input -
