name: Build win64 nonfree marcshared FFmpeg image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/buildkit.toml
      - .github/workflows/build-win64-nonfree-marcshared-image.yml
      - addins/**
      - images/**
      - patches/**
      - scripts.d/**
      - util/**
      - variants/**
      - download.sh
      - generate.sh
      - makeimage.sh

permissions:
  actions: write
  contents: write
  packages: write

env:
  TARGET: win64
  VARIANT: nonfree-marcshared
  SOURCE_REPO: ghcr.io/btbn/ffmpeg-builds
  TARGET_REPO: ghcr.io/marcmy/ffmpeg-builds
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: marcshared-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          df -h
          sudo apt-get clean
          docker system prune -a -f
          sudo rm -rf /opt/ghc /usr/local/.ghcup /usr/local/lib/android
          df -h

      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore FFmpeg source download cache
        id: ffmpeg-download-cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/downloads
          key: ffmpeg-download-cache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-${{ hashFiles('download.sh', 'util/dl_functions.sh', 'variants/**', 'scripts.d/**', 'addins/**') }}
          restore-keys: |
            ffmpeg-download-cache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config: .github/buildkit.toml

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Borrow BtbN base images
        run: |
          docker pull "$SOURCE_REPO/base:latest"
          docker pull "$SOURCE_REPO/base-win64:latest"

          docker tag "$SOURCE_REPO/base:latest" "$TARGET_REPO/base:latest"
          docker tag "$SOURCE_REPO/base-win64:latest" "$TARGET_REPO/base-win64:latest"

          docker push "$TARGET_REPO/base:latest"
          docker push "$TARGET_REPO/base-win64:latest"

      - name: Build win64 nonfree marcshared image
        env:
          BUILDKIT_PROGRESS: plain
        run: |
          FFBUILD_LOCAL_FINAL_CACHE=0 \
          FFBUILD_DOCKER_CACHE_FROM="type=registry,ref=${TARGET_REPO}/win64-nonfree-marcshared:buildcache" \
          FFBUILD_DOCKER_CACHE_TO="type=registry,ref=${TARGET_REPO}/win64-nonfree-marcshared:buildcache,mode=max" \
          QUICKBUILD=1 NOCLEAN=1 ./makeimage.sh "$TARGET" "$VARIANT"

      - name: Save FFmpeg source download cache
        if: ${{ always() && steps.ffmpeg-download-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .cache/downloads
          key: ffmpeg-download-cache-${{ runner.os }}-${{ env.TARGET }}-${{ env.VARIANT }}-${{ hashFiles('download.sh', 'util/dl_functions.sh', 'variants/**', 'scripts.d/**', 'addins/**') }}

      - name: Push win64 nonfree marcshared image
        run: |
          docker push "$TARGET_REPO/win64-nonfree-marcshared:latest"

      - name: Trigger marcshared FFmpeg release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${GITHUB_REPOSITORY}/dispatches \
            -f event_type=marcshared-image-updated
