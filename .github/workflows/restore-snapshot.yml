name: Restore requested snapshot

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: work
          fetch-depth: 0

      - name: Restore target snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git read-tree --reset -u 9fe7170ceadddf23d8a00e773871a2622c72833c
          git commit -m "Restore requested repository snapshot"
          git push origin HEAD:work
