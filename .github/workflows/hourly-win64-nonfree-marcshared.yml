name: Hourly FFmpeg win64 Nonfree Marcshared

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/hourly-win64-nonfree-marcshared.yml'
      - 'variants/win64-nonfree-marcshared.sh'
      - 'scripts.d/**'
  repository_dispatch:
    types:
      - marcshared-image-updated
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Build even when upstream FFmpeg SHA already has a release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

concurrency:
  group: hourly-ffmpeg-win64-nonfree-marcshared
  cancel-in-progress: false

env:
  UPSTREAM_REPO: https://github.com/FFmpeg/FFmpeg.git
  TARGET: win64
  VARIANT: nonfree-marcshared

jobs:
  check:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.check.outputs.changed }}
      sha: ${{ steps.upstream.outputs.sha }}
      short: ${{ steps.upstream.outputs.short }}
      package_version: ${{ steps.version.outputs.package_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Get upstream FFmpeg master SHA
        id: upstream
        run: |
          sha="$(git ls-remote "$UPSTREAM_REPO" refs/heads/master | awk '{print $1}')"
          short="${sha:0:12}"

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=$short" >> "$GITHUB_OUTPUT"

          echo "Upstream FFmpeg master: $sha"

      - name: Generate monotonic package version
        id: version
        run: |
          package_version="$(date -u +'%Y%m%d.%H%M%S')"
          release_tag="ffmpeg-${package_version}-win64-nonfree-marcshared"

          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

          echo "Package version: $package_version"
          echo "Release tag: $release_tag"

      - name: Check whether this upstream SHA already has a release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_BUILD: ${{ github.event_name == 'push' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.force) }}
          FFMPEG_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          if [[ "$FORCE_BUILD" == "true" ]]; then
            echo "Forced build requested"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_body="$(gh release view --repo "$GITHUB_REPOSITORY" --json body -q .body 2>/dev/null || true)"

          if grep -q "$FFMPEG_SHA" <<< "$latest_body"; then
            echo "Latest release already contains upstream SHA $FFMPEG_SHA"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream SHA"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.changed == 'true'

    runs-on: ubuntu-latest

    env:
      FFMPEG_SHA: ${{ needs.check.outputs.sha }}
      FFMPEG_SHORT: ${{ needs.check.outputs.short }}
      PACKAGE_VERSION: ${{ needs.check.outputs.package_version }}
      RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
      SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

      FFMPEG_REPO_OVERRIDE: https://github.com/FFmpeg/FFmpeg.git
      GIT_BRANCH_OVERRIDE: master

    steps:
      - name: Free disk space
        run: |
          df -h
          sudo apt-get clean
          docker system prune -a -f
          sudo rm -rf /opt/ghc /usr/local/.ghcup /usr/local/lib/android
          df -h

      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build FFmpeg
        run: |
          ./build.sh "$TARGET" "$VARIANT"

      - name: Prepare release artifacts
        run: |
          mkdir release
          cp artifacts/*.zip "release/ffmpeg-${PACKAGE_VERSION}-win64-nonfree-marcshared.zip"
          sha256sum release/* > release/checksums.sha256

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "FFmpeg win64 Nonfree Marcshared ${PACKAGE_VERSION}" \
            --notes "Upstream FFmpeg master SHA: ${FFMPEG_SHA}
Upstream FFmpeg short SHA: ${FFMPEG_SHORT}
Builder repository SHA: ${GITHUB_SHA}" \
            --latest

      - name: Update scoop manifest
        if: env.SCOOP_BUCKET_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.SCOOP_BUCKET_TOKEN }}
        run: |
          set -euo pipefail

          export ZIP_NAME="ffmpeg-${PACKAGE_VERSION}-win64-nonfree-marcshared.zip"
          export ZIP_HASH="$(sha256sum "release/${ZIP_NAME}" | awk '{print $1}')"
          export ZIP_URL="https://github.com/marcmy/FFmpeg-Builds/releases/download/${RELEASE_TAG}/${ZIP_NAME}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/marcmy/scoop-bucket.git" scoop-bucket

          cd scoop-bucket
          python3 - <<'PY'
import json
import os
from pathlib import Path

path = Path('bucket/ffmpeg-nonfree-marcshared.json')
data = json.loads(path.read_text())

version = os.environ['PACKAGE_VERSION']
zip_url = os.environ['ZIP_URL']
zip_hash = os.environ['ZIP_HASH']

data['version'] = version
data['architecture']['64bit']['url'] = zip_url
data['architecture']['64bit']['hash'] = zip_hash
data['checkver'] = {
    'script': [
        "$ErrorActionPreference='Stop'",
        "$headers=@{ 'User-Agent'='Scoop-Checkver'; 'Accept'='application/vnd.github+json'; 'X-GitHub-Api-Version'='2022-11-28' }",
        "$releases=Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/marcmy/FFmpeg-Builds/releases?per_page=50'",
        "$release=$releases | Where-Object { $_.tag_name -match '^ffmpeg-[0-9]{8}\\.[0-9]{6}-win64-nonfree-marcshared$' } | Select-Object -First 1",
        "if ($null -eq $release) { 'ffmpeg-00000000.000000-win64-nonfree-marcshared' } else { $release.tag_name }",
    ],
    'regex': r'^ffmpeg-([0-9]{8}\.[0-9]{6})-win64-nonfree-marcshared$',
    'replace': '$1',
}
data['autoupdate'] = {
    'architecture': {
        '64bit': {
            'url': 'https://github.com/marcmy/FFmpeg-Builds/releases/download/ffmpeg-$version-win64-nonfree-marcshared/ffmpeg-$version-win64-nonfree-marcshared.zip'
        }
    }
}

path.write_text(json.dumps(data, indent=4) + '\n')
PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/ffmpeg-nonfree-marcshared.json

          if git diff --cached --quiet; then
            echo "Scoop manifest already up to date"
          else
            git commit -m "Update ffmpeg-nonfree-marcshared to ${PACKAGE_VERSION}"
            git push
          fi
